spring.application.name=service-freight
server.port=8083

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portsofcall_freight}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:secret}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Inter-service communication
services.player.url=${SERVICES_PLAYER_URL:http://localhost:8082}
services.port.url=${SERVICES_PORT_URL:http://localhost:8085}
services.route.url=${SERVICES_ROUTE_URL:http://localhost:8085}
services.session.url=${SERVICES_SESSION_URL:http://localhost:8081}

# Customs Control
customs.trigger-probability=0.35
customs.min-hold-ticks=1
customs.max-hold-ticks=5
customs.bribe-threshold-multiplier=0.75
customs.min-processing-ticks=1
customs.max-processing-ticks=3

smuggling.offer-probability=0.33

ship.speed.default=42
ship.speed.low-cost=55
ship.speed.medium-cost=42
ship.speed.high-tech=30

ship.fuel.low-cost=20
ship.fuel.medium-cost=12
ship.fuel.high-tech=7
