spring.application.name=service-session
server.port=8081

# Database (own DB per service)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portsofcall_sessions}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:secret}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Inter-service communication
services.player.url=${SERVICES_PLAYER_URL:http://localhost:8082}
services.ship.url=${SERVICES_SHIP_URL:http://localhost:8083}
services.cargo.url=${SERVICES_CARGO_URL:http://localhost:8083}
