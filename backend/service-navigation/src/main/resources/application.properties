spring.application.name=service-navigation
server.port=8085

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portsofcall_navigation}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:secret}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

game.political-events.min-gap-ticks=8
game.political-events.max-gap-ticks=16
game.political-events.min-duration-ticks=50
game.political-events.max-duration-ticks=70
game.political-events.grace-period-ticks=3

game.pilot-strikes.min-gap-ticks=20
game.pilot-strikes.max-gap-ticks=40
game.pilot-strikes.min-duration-ticks=35
game.pilot-strikes.max-duration-ticks=50