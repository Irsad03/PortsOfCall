spring.application.name=service-player
server.port=8082

# Database (own DB per service)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portsofcall_players}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:secret}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Inter-service communication
services.port.url=${SERVICES_PORT_URL:http://localhost:8085}
services.freight.url=${SERVICES_SHIP_URL:http://localhost:8083}

# Mortgage tuning (game balancing)
mortgage.max-ltv=${MORTGAGE_MAX_LTV:0.6}
mortgage.overdue.penalty-rate=${MORTGAGE_OVERDUE_PENALTY_RATE:0.05}
mortgage.overdue.max-ticks=${MORTGAGE_OVERDUE_MAX_TICKS:5}
