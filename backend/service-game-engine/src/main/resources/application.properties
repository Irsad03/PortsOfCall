spring.application.name=service-game-engine
server.port=8087

# Tick interval (ms). 5 seconds = 1 in-game day
game.tick.interval-ms=5000

# Inter-service communication
services.session.url=${SERVICES_SESSION_URL:http://localhost:8081}
services.player.url=${SERVICES_PLAYER_URL:http://localhost:8082}
services.ship.url=${SERVICES_SHIP_URL:http://localhost:8083}
services.cargo.url=${SERVICES_CARGO_URL:http://localhost:8083}
services.route.url=${SERVICES_ROUTE_URL:http://localhost:8085}
